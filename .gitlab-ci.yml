stages:
  - test

python-tests:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
  script:
    - uv run pytest

browser-game-smoke:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  script:
    - npm ci
    - npm run test:ci
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - games/artifacts/test-results/
      - games/artifacts/playwright-report/
