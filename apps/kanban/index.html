<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermes Kanban Board</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">agent-apps operator surface</p>
          <h1>Hermes Kanban Board</h1>
          <p class="lede">A web control surface for the local Hermes workflow board, with operator writes and no dispatcher execution controls.</p>
        </div>
        <div class="status-card" data-testid="bridge-status">Loading bridge…</div>
      </header>

      <section class="safety-banner" data-testid="safety-banner">
        <strong>Loading safety posture.</strong>
        Checking bridge write mode…
      </section>

      <form id="create-task-form" class="toolbar create-card" aria-label="Create triage card">
        <label>
          <span>Title</span>
          <input name="title" required maxlength="180" placeholder="Task title" />
        </label>
        <label>
          <span>Body</span>
          <textarea name="body" rows="2" maxlength="8000" placeholder="Context, acceptance criteria, links…"></textarea>
        </label>
        <label>
          <span>Assignee</span>
          <input name="assignee" maxlength="80" placeholder="profile name" />
        </label>
        <label>
          <span>Tenant</span>
          <input name="tenant" maxlength="80" placeholder="default" />
        </label>
        <label>
          <span>Priority</span>
          <input name="priority" type="number" min="-1000" max="1000" value="0" />
        </label>
        <button type="submit">Create triage card</button>
        <span class="toolbar-note" data-testid="create-status">Checking write permissions…</span>
      </form>

      <section id="board" class="board" aria-live="polite"></section>
    </main>

    <aside id="drawer" class="drawer" data-testid="task-drawer" aria-label="Task details" hidden>
      <button type="button" id="drawer-close" class="drawer-close" aria-label="Close task details">×</button>
      <div id="drawer-body"></div>
    </aside>

    <script type="module" src="./app.js"></script>
  </body>
</html>
